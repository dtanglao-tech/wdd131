<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Product Review Form for WDD 131 by Daniel Tanglao.">
    <meta name="author" content="Daniel Tanglao">
    <title>WDD 131 Product Review Form</title>
    
    <link rel="stylesheet" href="styles/form.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;700&display=swap"
        rel="stylesheet">

    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review Form</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            <label for="productName">
                Product Name <span class="required">*</span>
            </label>

            <select id="productName" name="productName" required>
                <option value="" disabled selected>
                    Select a Product ...
                </option>
            </select>

            <label for="installDate">
                Date of Installation <span class="required">*</span>
            </label>
            <input type="date" id="installDate" name="installDate" required>
            <fieldset>
                <legend>
                    Overall Rating <span class="required">*</span>
                </legend>
                <div class="rating-group">
                    <label class="rating-option">
                        <span class="star-text">☆</span>
                        <input type="radio" id="rating1" name="rating" value="1" required>
                    </label>
                
                    <label class="rating-option">
                        <span class="star-text">☆☆</span>
                        <input type="radio" id="rating2" name="rating" value="2">
                    </label>
                
                    <label class="rating-option">
                        <span class="star-text">☆☆☆</span>
                        <input type="radio" id="rating3" name="rating" value="3">
                    </label>
                
                    <label class="rating-option">
                        <span class="star-text">☆☆☆☆</span>
                        <input type="radio" id="rating4" name="rating" value="4">
                    </label>
                
                    <label class="rating-option">
                        <span class="star-text">☆☆☆☆☆</span>
                        <input type="radio" id="rating5" name="rating" value="5">
                    </label>
                </div>
            </fieldset>

            <fieldset>
                <legend>
                    Useful Features
                </legend>
                <label>
                    <input type="checkbox" id="durable" name="features" value="Durable">
                    Durable
                </label>
                <label>
                    <input type="checkbox" id="affordable" name="features" value="Affordable">
                    Affordable
                </label>
                <label>
                    <input type="checkbox" id="easy" name="features" value="Easy to Use">
                    Easy to Use
                </label>
                <label>
                    <input type="checkbox" id="efficient" name="features" value="Efficient">
                    Efficient
                </label>
                <label>
                    <input type="checkbox" id="reliable" name="features" value="Reliable">
                    Reliable
                </label>
            </fieldset>

            <label for="reviewText">
                Written Review
            </label>
            <textarea id="reviewText" name="reviewText" rows="5"></textarea>
            <label for="reviewerName">
                User Name
            </label>
            <input type="text" id="reviewerName" name="reviewerName">
            <input type="submit" value="Submit Review" class="submit-btn">
        </form>
    </main>

    <footer>
        <p>
            &copy;
            <span id="currentyear"></span>
            Daniel Tanglao | Philippines
        </p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
